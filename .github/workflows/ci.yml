name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy src/selfos --ignore-missing-imports || true

      - name: Run tests
        run: pytest tests/ -q --tb=no

      - name: Validate Architecture Contract
        run: |
          test -f src/selfos/event_factory.py
          test -f src/selfos/plugin_registry.py
          test -f src/selfos/base_selfos_plugin.py
          echo "Architecture components verified"