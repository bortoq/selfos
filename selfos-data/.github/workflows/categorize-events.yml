name: Categorize New Events (Review Mode)

on:
  push:
    paths:
      - 'data/activity/**'
  workflow_dispatch:

jobs:
  categorize:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run categorization and create Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/categorize.py --create-issue

      - name: Update trust counter
        run: python scripts/trust_manager.py